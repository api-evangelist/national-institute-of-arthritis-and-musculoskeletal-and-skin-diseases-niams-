aid: national-institute-of-arthritis-and-musculoskeletal-and-skin-diseases-niams-
name: National Institute of Arthritis and Musculoskeletal and Skin Diseases (NIAMS)
description: >-
  The National Institute of Arthritis and Musculoskeletal and Skin Diseases
  (NIAMS) is part of the U.S. National Institutes of Health and supports
  research into the causes, treatment, and prevention of arthritis and
  musculoskeletal and skin diseases. NIAMS publishes health information,
  research resources, and grant data via its website.
